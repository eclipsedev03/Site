<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificação Auth </title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            height: 100vh;
            background: radial-gradient(circle, rgba(0, 0, 0, 1) 30%, rgba(10, 25, 50, 1) 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
            transition: background 1s ease;
        }

        @keyframes fadeIn {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        @keyframes slideIn {
            0% { transform: translateY(-100px); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        .container {
            text-align: center;
            background-color: rgba(0, 0, 0, 0.7);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 360px;
            animation: slideIn 1.5s ease-out;
        }

        .container .icon {
            background-color: #1fcf97;
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            animation: bounce 1s infinite alternate;
        }

        @keyframes bounce {
            0% { transform: translateY(0); }
            100% { transform: translateY(-10px); }
        }

        .container .icon::after {
            content: '✔';
            font-size: 32px;
            color: white;
            font-weight: bold;
        }

        .container h1 {
            font-size: 26px;
            margin-bottom: 12px;
            color: #1fcf97;
            animation: slideIn 1.5s ease-out;
        }

        .container p {
            font-size: 16px;
            margin-bottom: 20px;
            color: #ddd;
            animation: fadeIn 2s ease-out;
        }

        .container a {
            display: inline-block;
            text-decoration: none;
            background-color: #5b6def;
            color: white;
            padding: 14px 30px;
            border-radius: 8px;
            font-weight: bold;
            transition: background-color 0.3s ease, transform 0.2s ease;
            animation: fadeIn 2s ease-out;
        }

        .container a:hover {
            background-color: #3a4db6;
            transform: scale(1.1);
        }

        footer {
            margin-top: 20px;
            font-size: 14px;
            color: #bbb;
            animation: fadeIn 2s ease-out;
        }

        footer img {
            width: 18px;
            vertical-align: middle;
        }

        #particles-js {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            transition: opacity 1s ease;
            opacity: 0;
            z-index: 5;
        }

        .scroll-effect {
            opacity: 0;
            transition: opacity 1s ease-in-out;
        }

        .scroll-effect.visible {
            opacity: 1;
        }

    </style>
</head>
<body>
    <div id="particles-js"></div>
    <div id="overlay"></div>

    <div class="container">
        <div class="icon"></div>
        <h1>Você foi verificado!</h1>
        <p class="scroll-effect">Obrigado por se verificar 💘.</p>
        <a href="COLOQUE_O_LINK_DO_SEU_SERVIDOR" target="_blank" class="scroll-effect">Voltar para o Discord</a>
        <footer class="scroll-effect">
            <p>Developed by @SkyyHd2 e Chat GPT </p>
        </footer>
    </div>

    <script>
        particlesJS("particles-js", {
            "particles": {
                "number": {
                    "value": 100,
                    "density": {
                        "enable": true,
                        "value_area": 800
                    }
                },
                "color": {
                    "value": "#1fcf97"
                },
                "shape": {
                    "type": "circle",
                    "stroke": {
                        "width": 0,
                        "color": "#000000"
                    },
                    "polygon": {
                        "nb_sides": 5
                    }
                },
                "opacity": {
                    "value": 0.4,
                    "random": true,
                    "anim": {
                        "enable": true,
                        "speed": 1,
                        "opacity_min": 0.1,
                        "sync": false
                    }
                },
                "size": {
                    "value": 3,
                    "random": true,
                    "anim": {
                        "enable": true,
                        "speed": 4,
                        "size_min": 0.1,
                        "sync": false
                    }
                },
                "line_linked": {
                    "enable": false
                },
                "move": {
                    "enable": true,
                    "speed": 3,
                    "direction": "none",
                    "random": true,
                    "straight": false,
                    "out_mode": "out",
                    "bounce": false,
                    "attract": {
                        "enable": false
                    }
                }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": {
                    "onhover": {
                        "enable": true,
                        "mode": "repulse"
                    },
                    "onclick": {
                        "enable": true,
                        "mode": "push"
                    }
                }
            }
        });

        setTimeout(function() {
            window.location.href = "COLOQUE_O_LINK_DO_SEU_SERVIDOR";
        }, 5000);

        setTimeout(function() {
            document.getElementById("overlay").style.opacity = '1';
        }, 1000);

        const scrollElements = document.querySelectorAll('.scroll-effect');
        const handleScroll = () => {
            scrollElements.forEach(el => {
                const elementTop = el.getBoundingClientRect().top;
                const elementVisible = 150;

                if (elementTop < window.innerHeight - elementVisible) {
                    el.classList.add('visible');
                } else {
                    el.classList.remove('visible');
                }
            });
        };

        window.addEventListener('scroll', handleScroll);
        window.addEventListener('load', handleScroll);
    </script>
</body>
</html>
